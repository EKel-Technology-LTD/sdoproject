name: PR Validate
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

concurrency:
  group: pr-validate-${{ github.event.number }}
  cancel-in-progress: true

env:
  ORCHARD_URL: ${{ secrets.ORCHARD_URL }}        # e.g. https://orchard.<acct>.workers.dev
  ORCHARD_CI_TOKEN: ${{ secrets.ORCHARD_CI_TOKEN }}
  CI_POOL_ID: ${{ secrets.CI_POOL_ID }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0                          # delta needs base history

      # Pin Node: the npm `sf` runs under PATH node, and runner node 22.23.0 regressed
      # "unsettled top-level await" -> `sf org login sfdx-url` exit-13s. 22.22.3 is last-known-good
      # (it + sf 2.139.6 was the last green combo). Bump deliberately after testing a runner node.
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.3

      - name: Install Salesforce CLI + sfdx-git-delta
        run: |
          npm install --global @salesforce/cli@2.139.6     # pinned alongside the node pin above
          echo y | sf plugins install sfdx-git-delta
          sf version

      - name: Lease a CI sandbox from Orchard
        id: lease
        run: |
          resp=$(curl -sS -X POST "$ORCHARD_URL/api/ci/lease" \
            -H "authorization: Bearer $ORCHARD_CI_TOKEN" -H "content-type: application/json" \
            -d "{\"poolId\":\"$CI_POOL_ID\",\"holder\":\"gha-pr-${{ github.event.number }}-run-${{ github.run_id }}\",\"ttlSeconds\":3600}")
          lease_id=$(echo "$resp" | jq -r '.lease.id // empty')
          auth_url=$(echo "$resp" | jq -r '.org.sfdxAuthUrl // empty')
          if [ -z "$lease_id" ] || [ -z "$auth_url" ]; then
            echo "FAILURE_CLASS=infra" >> "$GITHUB_ENV"
            echo "::error::lease failed: $resp"; exit 1
          fi
          echo "LEASE_ID=$lease_id" >> "$GITHUB_ENV"
          printf '%s' "$auth_url" > /tmp/auth.url
          sf org login sfdx-url --set-default --sfdx-url-file /tmp/auth.url

      - name: Generate delta (base → head)
        run: |
          # No git merge: actions/checkout already provides the PR's merge ref, and validation runs with
          # `--ignore-conflicts`, so we avoid creating a merge commit (which would need a git identity the
          # hosted runner lacks → "empty ident name") and avoid hard-failing on a base/branch divergence.
          mkdir -p deltas
          sf sgd source delta --from "origin/${GITHUB_BASE_REF}" --to HEAD --output-dir deltas --generate-delta --ignore .forceignore

      - name: Validate delta per package (dry-run deploy via manifest, in sfdx-project.json order)
        run: |
          set -o pipefail
          TESTS=$(jq -r '.tests | join(",")' .ci/specified-tests.json 2>/dev/null || echo "")
          LEVEL=(--test-level RunLocalTests)
          [ -n "$TESTS" ] && LEVEL=(--test-level RunSpecifiedTests --tests "$TESTS")
          # sf project deploy start --dry-run is a validation; --manifest covers the full metadata set
          # (and is required for --post-destructive-changes).
          COMMON=(--dry-run --ignore-conflicts --wait 30 "${LEVEL[@]}")
          DESTRUCTIVE="deltas/destructiveChanges/destructiveChanges.xml"
          HAS_DESTRUCTIVE=false
          [ -f "$DESTRUCTIVE" ] && grep -q "<types>" "$DESTRUCTIVE" && HAS_DESTRUCTIVE=true
          fail() { echo "FAILURE_CLASS=validation" >> "$GITHUB_ENV"; echo "FAILED_PKG=$1" >> "$GITHUB_ENV"; exit 1; }

          validated=false
          # packageDirectories order in sfdx-project.json IS the deploy sequence — validate each package
          # in that order (multi-package repos: e.g. base → core → app). One manifest per package.
          while IFS= read -r pkg; do
            [ -d "deltas/$pkg" ] || { echo "↳ $pkg: no delta, skipped"; continue; }
            safe="${pkg//\//_}"
            echo "↳ $pkg: generate manifest from delta"
            sf project generate manifest --source-dir "deltas/$pkg" --output-dir "deltas/manifests/$safe" || fail "$pkg (manifest)"
            echo "# $pkg package.xml"; cat "deltas/manifests/$safe/package.xml"
            echo "↳ $pkg: validate (dry-run deploy)"
            sf project deploy start --manifest "deltas/manifests/$safe/package.xml" "${COMMON[@]}" --verbose 2>&1 | tee "log-$safe.txt" || fail "$pkg"
            validated=true
          done < <(jq -r '.packageDirectories[].path' sfdx-project.json)

          # Deletions are global (sgd emits one destructiveChanges.xml) → validate once, AFTER all
          # constructive packages. --post-destructive-changes needs a --manifest, so pass an empty one.
          if [ "$HAS_DESTRUCTIVE" = true ]; then
            APIVER=$(jq -r '.sourceApiVersion // empty' sfdx-project.json)
            [ -z "$APIVER" ] && APIVER=$(grep -oE '[0-9]+\.[0-9]+' deltas/package/package.xml | head -1)
            [ -z "$APIVER" ] && APIVER=60.0
            printf '<?xml version="1.0" encoding="UTF-8"?>\n<Package xmlns="http://soap.sforce.com/2006/04/metadata"><version>%s</version></Package>\n' "$APIVER" > deltas/empty-package.xml
            echo "↳ validate destructive deletions"
            sf project deploy start --manifest deltas/empty-package.xml --post-destructive-changes "$DESTRUCTIVE" "${COMMON[@]}" --verbose 2>&1 | tee log-destructive.txt || fail destructiveChanges
            validated=true
          fi

          if [ "$validated" = false ]; then echo "No deployable metadata in the delta — nothing to validate."; fi

      - name: Release the lease
        if: always() && env.LEASE_ID != ''
        run: |
          curl -sS -X POST "$ORCHARD_URL/api/ci/leases/$LEASE_ID/release" \
            -H "authorization: Bearer $ORCHARD_CI_TOKEN" || true

      - name: Upload delta + validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-delta-pr-${{ github.event.number }}
          path: |
            deltas/
            log-*.txt
          if-no-files-found: ignore

      - name: Report result to Orchard
        if: always()
        run: |
          # Make sure the review cycle exists before posting the result (closes the ensure/results race).
          curl -sS -X POST "$ORCHARD_URL/api/ci/review-cycles/ensure" \
            -H "authorization: Bearer $ORCHARD_CI_TOKEN" -H "content-type: application/json" \
            -d "{\"prUrl\":\"${{ github.event.pull_request.html_url }}\",\"headSha\":\"${{ github.event.pull_request.head.sha }}\"}" || true
          conclusion=$([ "${{ job.status }}" = "success" ] && echo pass || echo fail)
          class="${FAILURE_CLASS:-infra}"
          errors=$(grep -hE '(^| )Error|Component Failures|Test Failures|✖|✗|Failing: [1-9]' log-*.txt 2>/dev/null | head -c 4000)
          [ -z "$errors" ] && errors="${FAILED_PKG:+package $FAILED_PKG failed}"
          jq -n --arg pr "${{ github.event.pull_request.html_url }}" --arg sha "${{ github.event.pull_request.head.sha }}" \
                --arg c "$conclusion" --arg cls "$class" --arg e "$errors" --arg run "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
                '{prUrl:$pr, sha:$sha, conclusion:$c, failureClass:$cls, errors:$e, runUrl:$run}' \
          | curl -sS -X POST "$ORCHARD_URL/api/ci/results" \
              -H "authorization: Bearer $ORCHARD_CI_TOKEN" -H "content-type: application/json" -d @-

  request-review:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure the Orchard review cycle (idempotent)
        env:
          ORCHARD_URL: ${{ secrets.ORCHARD_URL }}
          ORCHARD_CI_TOKEN: ${{ secrets.ORCHARD_CI_TOKEN }}
        run: |
          curl -sS -X POST "$ORCHARD_URL/api/ci/review-cycles/ensure" \
            -H "authorization: Bearer $ORCHARD_CI_TOKEN" -H "content-type: application/json" \
            -d "{\"prUrl\":\"${{ github.event.pull_request.html_url }}\",\"headSha\":\"${{ github.event.pull_request.head.sha }}\"}"
